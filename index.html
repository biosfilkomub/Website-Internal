<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WebNal - Sistem Manajemen Resource Organisasi Internal">
  <title>WebNal - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="logo">
          <img src="assets/logo.png" alt="Logo" style="width:72px;height:72px;margin:0 auto 8px;display:block;border-radius:50%;">
          <p>Sistem Manajemen Organisasi</p>
        </div>

        <div class="auth-error" id="auth-error"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="nama@email.com" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Masukkan password" required>
          </div>

          <button type="submit" class="btn-primary" id="btn-login">
            Masuk
          </button>
        </form>

        <div class="auth-footer">
          Belum punya akun? <a href="register.html">Daftar di sini</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { login } from './js/auth.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";
    import { auth } from './js/firebase-config.js';

    // If already logged in, redirect to dashboard
    onAuthStateChanged(auth, (user) => {
      if (user && sessionStorage.getItem('userRole')) {
        window.location.href = 'dashboard.html';
      }
    });

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('auth-error');
    const btnLogin = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      btnLogin.textContent = 'Memproses...';
      btnLogin.disabled = true;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const result = await login(email, password);

      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = result.message;
        errorEl.classList.add('show');
        btnLogin.textContent = 'Masuk';
        btnLogin.disabled = false;
      }
    });
  </script>
</body>
</html>
