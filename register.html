<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Daftar akun baru WebNal">
  <title>WebNal - Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="logo">
          <img src="assets/logo.png" alt="Logo" style="width:72px;height:72px;margin:0 auto 8px;display:block;border-radius:50%;">
          <p>Buat Akun Baru</p>
        </div>

        <div class="auth-error" id="auth-error"></div>

        <form id="register-form">
          <div class="form-group">
            <label for="name">Nama Lengkap</label>
            <input type="text" id="name" placeholder="Masukkan nama lengkap" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="nama@email.com" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 6 karakter" required minlength="6">
          </div>

          <button type="submit" class="btn-primary" id="btn-register">
            Daftar
          </button>
        </form>

        <div class="auth-footer">
          Sudah punya akun? <a href="index.html">Masuk di sini</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { register } from './js/auth.js';

    const form = document.getElementById('register-form');
    const errorEl = document.getElementById('auth-error');
    const btnRegister = document.getElementById('btn-register');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      btnRegister.textContent = 'Memproses...';
      btnRegister.disabled = true;

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const result = await register(name, email, password, 'anggota');

      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = result.message;
        errorEl.classList.add('show');
        btnRegister.textContent = 'Daftar';
        btnRegister.disabled = false;
      }
    });
  </script>
</body>
</html>
